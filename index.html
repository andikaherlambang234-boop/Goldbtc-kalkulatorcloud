<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QUANT-SMC AUTO TERMINAL</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #e2e8f0; margin: 0; overflow-x: hidden; touch-action: manipulation; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .quantum-grad { background: linear-gradient(135deg, #4f46e5 0%, #9333ea 50%, #db2777 100%); }
        input { font-size: 16px !important; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const fmt = (val, dec = 2) => (val === undefined || isNaN(val) || val === null) ? "—" : Number(val).toFixed(dec);

        function App() {
            const [high, setHigh] = useState("");
            const [low, setLow] = useState("");
            const [price, setPrice] = useState("");
            const [calc, setCalc] = useState(null);

            const runAutomatedAnalysis = () => {
                const H = parseFloat(high);
                const L = parseFloat(low);
                const P = parseFloat(price);

                if (isNaN(H) || isNaN(L) || isNaN(P) || H <= L) {
                    alert("Mohon masukkan data yang benar. High harus lebih besar dari Low.");
                    return;
                }

                const range = H - L;
                const mid = (H + L) / 2;

                // --- 1. AUTOMATED SUPPORT & RESISTANCE ---
                const strongRes = H;
                const strongSup = L;
                const midRes = H - (range * 0.382);
                const midSup = L + (range * 0.236);

                // --- 2. AUTOMATED SMC (Supply & Demand) ---
                // Demand Zone = bottom 10% of range, Supply Zone = top 10% of range
                const demandTop = L + (range * 0.1);
                const demandBot = L;
                const supplyTop = H;
                const supplyBot = H - (range * 0.1);
                
                const inDemand = (P <= demandTop && P >= demandBot);
                const inSupply = (P >= supplyBot && P <= supplyTop);

                // --- 3. AUTOMATED MARKET STRUCTURE ---
                let ms = "RANGING";
                let msColor = "#94a3b8";
                if (P > H) { ms = "BOS BULLISH"; msColor = "#22c55e"; }
                else if (P < L) { ms = "BOS BEARISH"; msColor = "#ef4444"; }
                else if (P > mid && P < H) { ms = "BULLISH INTERNAL"; msColor = "#86efac"; }
                else { ms = "BEARISH INTERNAL"; msColor = "#fca5a5"; }

                // --- 4. AUTOMATED ORDER FLOW ---
                const flow = P > mid ? "BULLISH FLOW" : "BEARISH FLOW";
                const flowColor = flow === "BULLISH FLOW" ? "#22c55e" : "#ef4444";

                // --- 5. AUTOMATED FIBONACCI ---
                const fib618 = H - (range * 0.618); // Golden Ratio
                const fib50 = mid;

                // --- 6. MATH SCORING SYSTEM (CONFLUENCE) ---
                let score = 0;
                if (inDemand && flow === "BULLISH FLOW") score += 50;
                if (inSupply && flow === "BEARISH FLOW") score += 50;
                if (Math.abs(P - fib618) < (range * 0.05)) score += 30;
                if (ms.includes("BOS")) score += 20;

                // Signal Conclusion
                let signal = "NEUTRAL", sColor = "#94a3b8";
                let entry = P, sl = P, tp = P;

                if (score >= 60) {
                    if (flow === "BULLISH FLOW") {
                        signal = "STRONG BUY"; sColor = "#22c55e";
                        entry = inDemand ? demandTop : fib618;
                        sl = L - (range * 0.02);
                        tp = H;
                    } else {
                        signal = "STRONG SELL"; sColor = "#ef4444";
                        entry = inSupply ? supplyBot : H - (range * 0.382);
                        sl = H + (range * 0.02);
                        tp = L;
                    }
                } else if (score >= 30) {
                    signal = "CONSIDER TRADE"; sColor = "#f59e0b";
                    entry = P;
                    sl = flow === "BULLISH FLOW" ? L : H;
                    tp = flow === "BULLISH FLOW" ? H : L;
                }

                setCalc({
                    signal, sColor, score, entry, sl, tp,
                    ms, msColor, flow, flowColor,
                    strongRes, strongSup, midRes, midSup,
                    demandTop, supplyBot,
                    fib618, fib50,
                    inDemand, inSupply
                });
            };

            return (
                <div className="min-h-screen p-4 pb-10 max-w-md mx-auto">
                    <header className="text-center mb-8">
                        <h1 className="text-2xl font-black text-white italic tracking-tighter">
                            <span className="text-indigo-500">SMC</span> QUANT <span className="text-[10px] bg-indigo-600 px-2 py-0.5 rounded-full not-italic uppercase">Auto v5.0</span>
                        </h1>
                        <p className="text-slate-500 text-[10px] mono mt-1 uppercase tracking-widest">Automated Technical Analysis</p>
                    </header>

                    {/* MINIMAL INPUT PANEL */}
                    <div className="glass rounded-3xl p-6 mb-6 space-y-5 shadow-2xl border-indigo-500/20">
                        <div className="space-y-4">
                            <div>
                                <label className="text-[10px] text-slate-500 block mb-1 font-bold uppercase">Swing High</label>
                                <input type="number" value={high} onChange={e => setHigh(e.target.value)} className="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-white mono outline-none focus:border-indigo-500 transition-all" placeholder="0.00" />
                            </div>
                            <div>
                                <label className="text-[10px] text-slate-500 block mb-1 font-bold uppercase">Swing Low</label>
                                <input type="number" value={low} onChange={e => setLow(e.target.value)} className="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-white mono outline-none focus:border-indigo-500 transition-all" placeholder="0.00" />
                            </div>
                            <div>
                                <label className="text-[10px] text-slate-500 block mb-1 font-bold uppercase">Harga Sekarang</label>
                                <input type="number" value={price} onChange={e => setPrice(e.target.value)} className="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 text-white mono outline-none focus:border-indigo-500 transition-all" placeholder="0.00" />
                            </div>
                        </div>
                        <button onClick={runAutomatedAnalysis} className="w-full py-4 rounded-2xl quantum-grad text-white font-black uppercase tracking-widest shadow-lg active:scale-95 transition-transform">
                            Analyze Everything
                        </button>
                    </div>

                    {/* AUTOMATED RESULTS */}
                    {calc && (
                        <div className="fade-in space-y-4">
                            {/* Main Signal */}
                            <div className="glass rounded-3xl p-6 text-center border-t-4 border-indigo-500">
                                <div className="text-[10px] font-bold text-slate-500 uppercase mb-1">Final Signal</div>
                                <div className="text-4xl font-black mb-2 tracking-tighter" style={{ color: calc.sColor }}>{calc.signal}</div>
                                
                                <div className="flex flex-wrap justify-center gap-2 mb-6">
                                    <span className="px-2 py-1 rounded-md text-[9px] font-bold border bg-blue-500/20 text-blue-400 border-blue-500/40" style={{color: calc.msColor}}>{calc.ms}</span>
                                    <span className="px-2 py-1 rounded-md text-[9px] font-bold border bg-green-500/20 text-green-400 border-green-500/40" style={{color: calc.flowColor}}>{calc.flow}</span>
                                    <span className="px-2 py-1 rounded-md text-[9px] font-bold border bg-amber-500/20 text-amber-400 border-amber-500/40">
                                        {calc.inDemand ? "DEMAND ZONE" : calc.inSupply ? "SUPPLY ZONE" : "NO ZONE"}
                                    </span>
                                </div>

                                <div className="space-y-2 text-left">
                                    <div className="flex justify-between p-3 bg-white/5 rounded-xl">
                                        <span className="text-xs text-slate-400">ENTRY LIMIT</span>
                                        <span className="text-sm font-bold mono text-white">{fmt(calc.entry)}</span>
                                    </div>
                                    <div className="flex justify-between p-3 bg-red-500/10 rounded-xl">
                                        <span className="text-xs text-slate-400">STOP LOSS</span>
                                        <span className="text-sm font-bold mono text-red-500">{fmt(calc.sl)}</span>
                                    </div>
                                    <div className="flex justify-between p-3 bg-green-500/10 rounded-xl">
                                        <span className="text-xs text-slate-400">TAKE PROFIT</span>
                                        <span className="text-sm font-bold mono text-green-500">{fmt(calc.tp)}</span>
                                    </div>
                                </div>
                                <div className="mt-4 text-center">
                                    <div className="text-[10px] text-slate-500 mb-1 uppercase">Confluence Accuracy</div>
                                    <div className="text-lg font-black mono text-indigo-400">{calc.score}%</div>
                                </div>
                            </div>

                            {/* Automated Technical Data */}
                            <div className="grid grid-cols-1 gap-4">
                                <div className="glass rounded-3xl p-5">
                                    <h3 className="text-xs font-bold text-slate-500 uppercase mb-4">S&R & SMC Zones</h3>
                                    <div className="space-y-3">
                                        <div className="flex justify-between items-center py-2 border-b border-white/5">
                                            <span className="text-xs text-slate-400">Strong Resistance</span>
                                            <span className="text-sm font-bold mono text-red-400">{fmt(calc.strongRes)}</span>
                                        </div>
                                        <div className="flex justify-between items-center py-2 border-b border-white/5">
                                            <span className="text-xs text-slate-400">Strong Support</span>
                                            <span className="text-sm font-bold mono text-green-400">{fmt(calc.strongSup)}</span>
                                        </div>
                                        <div className="flex justify-between items-center py-2 border-b border-white/5">
                                            <span className="text-xs text-slate-400">Supply Zone (Top)</span>
                                            <span className="text-sm font-bold mono text-red-300">{fmt(calc.supplyBot)} - {fmt(calc.supplyTop)}</span>
                                        </div>
                                        <div className="flex justify-between items-center py-2 border-b border-white/5">
                                            <span className="text-xs text-slate-400">Demand Zone (Bot)</span>
                                            <span className="text-sm font-bold mono text-green-300">{fmt(calc.demandBot)} - {fmt(calc.demandTop)}</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="glass rounded-3xl p-5">
                                    <h3 className="text-xs font-bold text-slate-500 uppercase mb-4">Fibonacci Levels</h3>
                                    <div className="space-y-3">
                                        <div className="flex justify-between items-center py-2 border-b border-white/5">
                                            <span className="text-xs text-slate-400">Golden Ratio (61.8%)</span>
                                            <span className="text-sm font-bold mono text-indigo-400">{fmt(calc.fib618)}</span>
                                        </div>
                                        <div className="flex justify-between items-center py-2 border-b border-white/5">
                                            <span className="text-xs text-slate-400">Equilibrium (50%)</span>
                                            <span className="text-sm font-bold mono text-slate-300">{fmt(calc.fib50)}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
