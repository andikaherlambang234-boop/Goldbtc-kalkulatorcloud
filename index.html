<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTIMATE QUANT-SMC TERMINAL</title>
    
    <!-- Scripts -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #e2e8f0; margin: 0; touch-action: manipulation; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .quantum-grad { background: linear-gradient(135deg, #4f46e5 0%, #9333ea 50%, #db2777 100%); }
        .gold-text { color: #fbbf24; }
        input { font-size: 16px !important; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; color: #6366f1; font-family: monospace;">
            Initializing Quant Engine...
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const fmt = (val, dec = 2) => (val === undefined || isNaN(val)) ? "—" : Number(val).toFixed(dec);

        function App() {
            // --- STATE ---
            const [asset, setAsset] = useState("XAUUSD");
            const [livePrice, setLivePrice] = useState(0);
            const [high, setHigh] = useState("");
            const [low, setLow] = useState("");
            const [price, setPrice] = useState("");
            const [obTop, setObTop] = useState(""); 
            const [obBot, setObBot] = useState(""); 
            const [balance, setBalance] = useState("1000");
            const [risk, setRisk] = useState("1");
            const [volume, setVolume] = useState("MEDIUM");
            const [calc, setCalc] = useState(null);
            const [isAuto, setIsAuto] = useState(false);

            // Real-time Price API (Binance)
            useEffect(() => {
                const fetchPrice = async () => {
                    try {
                        const symbol = asset === "XAUUSD" ? "PAXGUSDT" : "BTCUSDT";
                        const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`);
                        const data = await res.json();
                        setLivePrice(parseFloat(data.price));
                    } catch (e) { console.error("API Error"); }
                };
                fetchPrice();
                const interval = setInterval(fetchPrice, 3000);
                return () => clearInterval(interval);
            }, [asset]);

            // --- THE QUANT-SMC MATHEMATICAL SYSTEM ---
            const runAnalysis = () => {
                const H = parseFloat(high);
                const L = parseFloat(low);
                const currentP = isAuto ? livePrice : parseFloat(price);

                if (isNaN(H) || isNaN(L) || isNaN(currentP) || H <= L) {
                    alert("Input data tidak lengkap atau tidak valid!");
                    return;
                }

                const range = H - L;
                const dec = asset === "BITCOIN" ? 0 : 2;

                // 1. Market Structure (MS)
                // Logic: Jika harga menembus High terakhir = BOS Bullish, jika menembus Low = BOS Bearish
                const msStatus = currentP > H ? "BOS BULLISH" : currentP < L ? "BOS BEARISH" : "RANGING/CHOCH";
                const msScore = (currentP > H || currentP < L) ? 20 : 0;

                // 2. Strong Supply & Demand (S&D)
                const inDemand = (currentP <= parseFloat(obTop) && currentP >= parseFloat(obBot));
                const inSupply = (currentP >= parseFloat(obBot) && currentP <= parseFloat(obTop)); // Simplified for demo
                const sdScore = inDemand || inSupply ? 30 : 0;
                const sdStatus = inDemand ? "STRONG DEMAND" : inSupply ? "STRONG SUPPLY" : "NO ZONE";

                // 3. Order Flow (OF)
                const ofDirection = currentP > (H + L) / 2 ? "BULLISH FLOW" : "BEARISH FLOW";
                const ofScore = (ofDirection === "BULLISH FLOW" && currentP > L) ? 15 : 0;

                // 4. Fibonacci (Golden Ratio 61.8% & 78.6%)
                const goldenRatio = H - (0.618 * range);
                const nearGolden = Math.abs(currentP - goldenRatio) < (range * 0.05);
                const fibScore = nearGolden ? 25 : 0;

                // 5. Volume Weighting
                const volMult = volume === "HIGH" ? 1.3 : volume === "LOW" ? 0.7 : 1.0;

                // --- FINAL CONFLUENCE MATH ---
                let totalScore = (msScore + sdScore + ofScore + fibScore) * volMult;
                totalScore = Math.min(100, totalScore);

                // Signal Decision
                let signal = "NEUTRAL", color = "#94a3b8", type = "WAIT";
                let entry = currentP, sl = currentP, tp = currentP;

                if (totalScore >= 60 && ofDirection === "BULLISH FLOW") {
                    signal = "STRONG BUY"; color = "#22c55e"; type = "BUY LIMIT";
                    entry = inDemand ? parseFloat(obTop) : goldenRatio;
                    sl = L - (range * 0.05);
                    tp = H + (range * 0.382);
                } else if (totalScore >= 60 && ofDirection === "BEARISH FLOW") {
                    signal = "STRONG SELL"; color = "#ef4444"; type = "SELL LIMIT";
                    entry = inDemand ? parseFloat(obBot) : H - (0.382 * range);
                    sl = H + (range * 0.05);
                    tp = L - (range * 0.382);
                }

                // Risk Management
                const riskAmount = (parseFloat(balance) * (parseFloat(risk) / 100));
                const slDistance = Math.abs(entry - sl);
                const lotSize = slDistance > 0 ? riskAmount / (slDistance * 10) : 0;

                setCalc({
                    signal, color, score: totalScore, type, entry, sl, tp, lotSize,
                    msStatus, sdStatus, ofDirection, dec
                });
            };

            return (
                <div className="min-h-screen p-4 pb-10 max-w-md mx-auto">
                    {/* Header */}
                    <header className="text-center mb-6">
                        <h1 className="text-2xl font-black text-white italic tracking-tighter">
                            <span className="text-indigo-500">SMC</span> QUANT <span className="text-[10px] bg-indigo-600 px-2 py-0.5 rounded-full not-italic uppercase">Ultimate v3.0</span>
                        </h1>
                        <div className="mt-4 p-3 glass rounded-2xl flex justify-between items-center px-4 border-indigo-500/30">
                            <span className="text-xs font-bold text-slate-400 uppercase">{asset} LIVE</span>
                            <span className="text-xl font-black mono text-indigo-400">
                                ${fmt(livePrice, asset === "BITCOIN" ? 0 : 2)}
                            </span>
                        </div>
                    </header>

                    {/* Asset Switcher */}
                    <div className="flex gap-2 mb-6 justify-center">
                        {["XAUUSD", "BITCOIN"].map(a => (
                            <button key={a} onClick={() => {setAsset(a); setCalc(null);}} 
                                className={`px-4 py-1 rounded-full text-xs font-bold transition-all ${asset === a ? 'bg-white text-black' : 'glass text-slate-400'}`}>
                                {a === "XAUUSD" ? "GOLD" : "BTC"}
                            </button>
                        ))}
                    </div>

                    {/* Input Section */}
                    <div className="glass rounded-3xl p-5 mb-6 space-y-4">
                        <div className="grid grid-cols-2 gap-3">
                            <div>
                                <label className="text-[10px] text-slate-500 block mb-1">SWING HIGH</label>
                                <input type="number" value={high} onChange={e => setHigh(e.target.value)} className="w-full bg-slate-900 border border-white/10 rounded-xl px-3 py-3 text-white mono outline-none" placeholder="0.00" />
                            </div>
                            <div>
                                <label className="text-[10px] text-slate-500 block mb-1">SWING LOW</label>
                                <input type="number" value={low} onChange={e => setLow(e.target.value)} className="w-full bg-slate-900 border border-white/10 rounded-xl px-3 py-3 text-white mono outline-none" placeholder="0.00" />
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-3">
                            <div>
                                <label className="text-[10px] text-amber-500 block mb-1 font-bold">S&D TOP (OB)</label>
                                <input type="number" value={obTop} onChange={e => setObTop(e.target.value)} className="w-full bg-slate-900 border border-amber-500/30 rounded-xl px-3 py-3 text-white mono outline-none" placeholder="0.00" />
                            </div>
                            <div>
                                <label className="text-[10px] text-amber-500 block mb-1 font-bold">S&D BOT (OB)</label>
                                <input type="number" value={obBot} onChange={e => setObBot(e.target.value)} className="w-full bg-slate-900 border border-amber-500/30 rounded-xl px-3 py-3 text-white mono outline-none" placeholder="0.00" />
                            </div>
                        </div>

                        <div>
                            <label className="text-[10px] text-slate-500 block mb-1">CURRENT PRICE</label>
                            <div className="flex gap-2">
                                <input type="number" value={isAuto ? livePrice : price} onChange={e => setPrice(e.target.value)} className={`flex-1 bg-slate-900 border border-white/10 rounded-xl px-3 py-3 text-white mono outline-none ${isAuto ? 'opacity-50' : ''}`} placeholder="0.00" />
                                <button onClick={() => setIsAuto(!isAuto)} className={`px-3 rounded-xl text-[10px] font-bold ${isAuto ? 'bg-green-600 text-white' : 'glass text-slate-400'}`}>
                                    {isAuto ? "AUTO" : "MANUAL"}
                                </button>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-3">
                            <div>
                                <label className="text-[10px] text-slate-500 block mb-1">BALANCE ($)</label>
                                <input type="number" value={balance} onChange={e => setBalance(e.target.value)} className="w-full bg-slate-900 border border-white/10 rounded-xl px-3 py-3 text-white mono outline-none" />
                            </div>
                            <div>
                                <label className="text-[10px] text-slate-500 block mb-1">RISK (%)</label>
                                <input type="number" value={risk} onChange={e => setRisk(e.target.value)} className="w-full bg-slate-900 border border-white/10 rounded-xl px-3 py-3 text-white mono outline-none" />
                            </div>
                        </div>

                        <div>
                            <label className="text-[10px] text-slate-500 block mb-1 uppercase">Volume Market</label>
                            <div className="flex gap-2">
                                {["LOW", "MEDIUM", "HIGH"].map(v => (
                                    <button key={v} onClick={() => setVolume(v)} className={`flex-1 py-2 text-[10px] font-bold rounded-lg border transition-all ${volume === v ? 'bg-indigo-600 border-indigo-400 text-white' : 'bg-slate-900 border-white/10 text-slate-500'}`}>{v}</button>
                                ))}
                            </div>
                        </div>

                        <button onClick={runAnalysis} className="w-full py-4 rounded-2xl quantum-grad text-white font-black uppercase tracking-widest shadow-lg active:scale-95 transition-transform">
                            Execute Quant Analysis
                        </button>
                    </div>

                    {/* Final Results */}
                    {calc && (
                        <div className="fade-in space-y-4">
                            <div className="glass rounded-3xl p-6 text-center border-t-4 border-indigo-500">
                                <div className="text-[10px] font-bold text-slate-500 uppercase mb-1">Executive Signal</div>
                                <div className="text-4xl font-black mb-2 tracking-tighter" style={{ color: calc.color }}>{calc.signal}</div>
                                
                                <div className="flex flex-wrap justify-center gap-2 mb-6">
                                    <span className="px-2 py-1 rounded-md text-[9px] font-bold border bg-blue-500/20 text-blue-400 border-blue-500/40">{calc.msStatus}</span>
                                    <span className="px-2 py-1 rounded-md text-[9px] font-bold border bg-amber-500/20 text-amber-400 border-amber-500/40">{calc.sdStatus}</span>
                                    <span className="px-2 py-1 rounded-md text-[9px] font-bold border bg-green-500/20 text-green-400 border-green-500/40">{calc.ofDirection}</span>
                                </div>

                                <div className="grid grid-cols-2 gap-2 mb-6">
                                    <div className="bg-slate-900 p-3 rounded-2xl border border-white/5">
                                        <div className="text-[9px] text-slate-500 uppercase">Trade Type</div>
                                        <div className="text-xs font-bold text-white">{calc.type}</div>
                                    </div>
                                    <div className="bg-slate-900 p-3 rounded-2xl border border-white/5">
                                        <div className="text-[9px] text-slate-500 uppercase">Lot Size</div>
                                        <div className="text-xs font-bold text-indigo-400 mono">{fmt(calc.lotSize, 2)} Lot</div>
                                    </div>
                                </div>

                                <div className="space-y-2 text-left">
                                    <div className="flex justify-between p-3 bg-white/5 rounded-xl">
                                        <span className="text-xs text-slate-400">ENTRY LIMIT</span>
                                        <span className="text-sm font-bold mono text-white">{fmt(calc.entry, calc.dec)}</span>
                                    </div>
                                    <div className="flex justify-between p-3 bg-red-500/10 rounded-xl">
                                        <span className="text-xs text-slate-400">STOP LOSS</span>
                                        <span className="text-sm font-bold mono text-red-500">{fmt(calc.sl, calc.dec)}</span>
                                    </div>
                                    <div className="flex justify-between p-3 bg-green-500/10 rounded-xl">
                                        <span className="text-xs text-slate-400">TAKE PROFIT</span>
                                        <span className="text-sm font-bold mono text-green-500">{fmt(calc.tp, calc.dec)}</span>
                                    </div>
                                </div>
                                <div className="mt-4 text-center">
                                    <div className="text-[10px] text-slate-500 mb-1 uppercase">Confluence Accuracy</div>
                                    <div className="text-lg font-black mono text-indigo-400">{calc.score.toFixed(1)}%</div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
