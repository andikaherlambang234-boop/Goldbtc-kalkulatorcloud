<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Trader Mobile</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #e2e8f0; margin: 0; touch-action: manipulation; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .quantum-grad { background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%); }
        input { font-size: 16px !important; } /* Mencegah auto-zoom di iPhone */
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const fmt = (val, dec = 2) => (val === undefined || isNaN(val)) ? "—" : Number(val).toFixed(dec);

        function App() {
            const [asset, setAsset] = useState("XAUUSD");
            const [high, setHigh] = useState("");
            const [low, setLow] = useState("");
            const [price, setPrice] = useState("");
            const [vol, setVol] = useState("MEDIUM");
            const [calc, setCalc] = useState(null);
            const [tab, setTab] = useState("signal");

            const runAnalysis = () => {
                const H = parseFloat(high);
                const L = parseFloat(low);
                const P = parseFloat(price);
                if (isNaN(H) || isNaN(L) || isNaN(P) || H <= L) {
                    alert("Input tidak valid! Pastikan High > Low");
                    return;
                }

                const range = H - L;
                const dec = asset === "BITCOIN" ? 0 : 2;
                const psi = Math.sin(Math.PI * (P - L) / range);
                const score = ( (0.5 - (P-L)/range) * 200 ) + (psi * 40);
                const finalScore = Math.max(-100, Math.min(100, score));

                let signal = "WAIT", color = "#94a3b8";
                if (finalScore >= 45) { signal = "STRONG BUY"; color = "#22c55e"; }
                else if (finalScore <= -45) { signal = "STRONG SELL"; color = "#ef4444"; }

                setCalc({ 
                    signal, color, score: finalScore, 
                    entry: P, 
                    sl: signal.includes("BUY") ? Math.max(L, P - range * 0.15) : Math.min(H, P + range * 0.15),
                    tp: signal.includes("BUY") ? P + range * 0.618 : P - range * 0.618,
                    range, dec, psi
                });
            };

            return (
                <div className="min-h-screen p-4 pb-10 max-w-md mx-auto">
                    <header className="text-center mb-6">
                        <h1 className="text-2xl font-black text-white italic tracking-tighter">
                            <span className="text-indigo-500">QUANTUM</span> TRADER <span className="text-[10px] bg-indigo-600 px-2 py-0.5 rounded-full not-italic">MOBILE v2.1</span>
                        </h1>
                        <div className="flex justify-center gap-2 mt-4">
                            {["XAUUSD", "BITCOIN"].map(a => (
                                <button key={a} onClick={() => {setAsset(a); setCalc(null);}} 
                                    className={`px-4 py-1 rounded-full text-xs font-bold transition-all ${asset === a ? 'bg-white text-black' : 'glass text-slate-400'}`}>
                                    {a === "XAUUSD" ? "GOLD" : "BTC"}
                                </button>
                            ))}
                        </div>
                    </header>

                    <div className="glass rounded-3xl p-5 mb-6">
                        <h3 className="text-xs font-bold text-slate-500 uppercase mb-4 text-center">Input Data Market</h3>
                        <div className="space-y-4">
                            <div className="grid grid-cols-2 gap-3">
                                <div>
                                    <label className="text-[10px] text-slate-500 block mb-1">SWING HIGH</label>
                                    <input type="number" inputMode="decimal" value={high} onChange={e => setHigh(e.target.value)} className="w-full bg-slate-900 border border-white/10 rounded-xl px-3 py-3 text-white mono outline-none focus:border-indigo-500" placeholder="0.00" />
                                </div>
                                <div>
                                    <label className="text-[10px] text-slate-500 block mb-1">SWING LOW</label>
                                    <input type="number" inputMode="decimal" value={low} onChange={e => setLow(e.target.value)} className="w-full bg-slate-900 border border-white/10 rounded-xl px-3 py-3 text-white mono outline-none focus:border-indigo-500" placeholder="0.00" />
                                </div>
                            </div>
                            <div>
                                <label className="text-[10px] text-slate-500 block mb-1">HARGA SAAT INI</label>
                                <input type="number" inputMode="decimal" value={price} onChange={e => setPrice(e.target.value)} className="w-full bg-slate-900 border border-white/10 rounded-xl px-3 py-3 text-white mono outline-none focus:border-indigo-500" placeholder="0.00" />
                            </div>
                            <div>
                                <label className="text-[10px] text-slate-500 block mb-1">VOLUME MARKET</label>
                                <div className="flex gap-2">
                                    {["LOW", "MEDIUM", "HIGH"].map(v => (
                                        <button key={v} onClick={() => setVol(v)} className={`flex-1 py-2 text-[10px] font-bold rounded-lg border transition-all ${vol === v ? 'bg-indigo-600 border-indigo-400 text-white' : 'bg-slate-900 border-white/10 text-slate-500'}`}>{v}</button>
                                    ))}
                                </div>
                            </div>
                            <button onClick={runAnalysis} className="w-full py-4 rounded-2xl quantum-grad text-white font-black uppercase tracking-widest shadow-lg active:scale-95 transition-transform">
                                Hitung Sinyal
                            </button>
                        </div>
                    </div>

                    {calc && (
                        <div className="fade-in">
                            <div className="glass rounded-3xl p-6 mb-6 text-center border-t-4 border-indigo-500">
                                <div className="text-[10px] font-bold text-slate-500 uppercase mb-1">Quantum Signal</div>
                                <div className="text-4xl font-black mb-4 tracking-tighter" style={{ color: calc.color }}>{calc.signal}</div>
                                
                                <div className="flex justify-center gap-2 mb-6">
                                    <span className="px-2 py-1 rounded-md text-[9px] font-bold border bg-indigo-500/20 text-indigo-400 border-indigo-500/40">PSI: {calc.psi.toFixed(2)}</span>
                                    <span className="px-2 py-1 rounded-md text-[9px] font-bold border bg-amber-500/20 text-amber-400 border-amber-500/40">VOL: {vol}</span>
                                </div>

                                <div className="relative h-2 bg-slate-900 rounded-full overflow-hidden mb-2">
                                    <div className="absolute h-full transition-all duration-1000" 
                                         style={{ 
                                            width: `${Math.abs(calc.score)}%`, 
                                            backgroundColor: calc.score > 0 ? '#22c55e' : '#ef4444',
                                            left: calc.score > 0 ? '50%' : `${50 - Math.abs(calc.score)}%` 
                                         }}></div>
                                </div>
                                <div className="flex justify-between text-[9px] mono text-slate-600">
                                    <span>BEAR</span>
                                    <span>SCORE: {calc.score.toFixed(0)}%</span>
                                    <span>BULL</span>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 gap-4">
                                <div className="glass rounded-3xl p-5">
                                    <h3 className="text-xs font-bold text-slate-500 uppercase mb-4">Trade Setup</h3>
                                    <div className="space-y-3">
                                        <div className="flex justify-between items-center py-2 border-b border-white/5">
                                            <span className="text-xs text-slate-500">ENTRY</span>
                                            <span className="text-sm font-bold mono" style={{color: calc.color}}>{fmt(calc.entry, calc.dec)}</span>
                                        </div>
                                        <div className="flex justify-between items-center py-2 border-b border-white/5">
                                            <span className="text-xs text-slate-500">STOP LOSS</span>
                                            <span className="text-sm font-bold mono text-red-500">{fmt(calc.sl, calc.dec)}</span>
                                        </div>
                                        <div className="flex justify-between items-center py-2 border-b border-white/5">
                                            <span className="text-xs text-slate-500">TARGET TP</span>
                                            <span className="text-sm font-bold mono text-green-500">{fmt(calc.tp, calc.dec)}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
